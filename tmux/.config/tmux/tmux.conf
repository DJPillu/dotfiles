
##### GENERAL #####
set -g default-terminal "tmux-256color"

# Truecolor / RGB everywhere (better than targeting xterm-256color only)
set -as terminal-overrides ",*:RGB"

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 0 can make ESC/Alt sequences flaky in vim; 10ms is a safe sweet spot
set -sg escape-time 10

# New panes/windows inherit the current pane's working directory
#setw -g pane-current-path "#{pane_current_path}"

##### PREFIX #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### SPLITS #####
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

##### PANE NAVIGATION (vim-style) #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### RESIZE PANES #####
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### WINDOWS #####
bind c new-window
bind n next-window
bind p previous-window
bind & kill-window

##### COPY MODE (vi) #####
setw -g mode-keys vi

# Let tmux advertise clipboard capability when supported by terminal (doesn't replace the script)
set -g set-clipboard on

# Selection controls (vim-like)
bind -T copy-mode-vi v send -X begin-selection

# 'y' copies selection to tmux buffer AND pipes to system clipboard (mac/wayland/x11/wsl)
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "~/.local/bin/tmux-copy"

# Optional: 'Y' copies the whole line quickly (useful for logs)
bind -T copy-mode-vi Y send -X copy-line \; run-shell "tmux save-buffer - | ~/.local/bin/tmux-copy"

##### STATUS BAR #####
set -g status-position bottom
set -g status-interval 2
set -g status-style "bg=#1e1e2e fg=#cdd6f4"

set -g status-left "#[fg=#89b4fa]#S #[fg=#6c7086]|"
set -g status-right "#[fg=#6c7086]%Y-%m-%d #[fg=#89b4fa]%H:%M"

setw -g window-status-style "fg=#6c7086"
setw -g window-status-current-style "fg=#cdd6f4,bold"

##### QUICK RELOAD #####
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

##### PLUGIN SETUP #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Optional but nice for vim users (clipboard + OSC52 tricks if you ever go fully remote)
# set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.config/tmux/plugins/tpm/tpm'
