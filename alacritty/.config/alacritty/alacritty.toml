
[env]
TERM = "xterm-256color"

[window]
padding = { x = 8, y = 8 }
decorations = "none"
opacity = 0.98
startup_mode = "Windowed"

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[cursor]
style = "Block"
unfocused_hollow = true

[scrolling]
history = 10000
multiplier = 3

[keyboard]
bindings = [
  # tmux prefix passthrough (Ctrl+b)
  { key = "B", mods = "Control", chars = "\u0002" },

  # copy / paste
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  # font size
  { key = "Plus", mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0", mods = "Control", action = "ResetFontSize" }
]

[general]
live_config_reload = true

